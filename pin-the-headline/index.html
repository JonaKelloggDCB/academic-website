<!doctype html>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pin the Headline</title>
<style>
  /* ---- Pin the Headline — self-contained styles (all scoped under .pth) ---- */
  .pth {
    --pth-bg: #f3ece0;
    --pth-card: #fffaf1;
    --pth-card-2: #efe6d4;
    --pth-ink: #322e27;
    --pth-ink-dim: #6f6555;
    --pth-line: #4361ee;
    --pth-area: rgba(67, 97, 238, 0.12);
    --pth-area-top: rgba(67, 97, 238, 0.20);
    --pth-area-bot: rgba(67, 97, 238, 0.02);
    --pth-grid: rgba(60, 48, 24, 0.10);
    --pth-axis: rgba(60, 48, 24, 0.22);
    --pth-border: rgba(60, 48, 24, 0.14);
    --pth-pin: #e8990f;
    --pth-true: #1f8a3c;
    --pth-ghost: #b4a890;
    --pth-bad: #d6453f;
    --pth-radius: 16px;
    --pth-shadow: 0 1px 2px rgba(60, 45, 20, 0.05), 0 10px 28px rgba(60, 45, 20, 0.08);
    --pth-focus: #e8990f;
    color-scheme: light;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--pth-ink);
    background: linear-gradient(180deg, #f7f1e7 0%, #efe6d6 100%);
    border-radius: var(--pth-radius);
    max-width: 760px;
    margin: 0 auto;
    padding: 18px;
    box-sizing: border-box;
    line-height: 1.45;
  }
  .pth *, .pth *::before, .pth *::after { box-sizing: border-box; }

  .pth-header { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
  .pth-title { font-size: 1.05rem; font-weight: 800; letter-spacing: 0.02em; margin: 0; }
  .pth-title .pth-pin-emoji { margin-right: 6px; }
  .pth-context { color: var(--pth-ink-dim); font-size: 0.85rem; font-weight: 600; }

  .pth-back {
    appearance: none; border: 0; background: none; color: var(--pth-ink-dim);
    font-size: 0.8rem; font-weight: 700; cursor: pointer; padding: 2px 6px; border-radius: 6px;
  }
  .pth-back:hover { color: var(--pth-ink); }
  .pth-back:focus-visible { outline: 2px solid var(--pth-focus); }

  .pth-headline-card {
    background: var(--pth-card);
    border: 1px solid var(--pth-border);
    border-radius: var(--pth-radius);
    padding: 14px 16px;
    margin-bottom: 12px;
  }
  .pth-kicker { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--pth-ink-dim); font-weight: 700; margin-bottom: 4px; }
  .pth-headline { font-size: 1.12rem; font-weight: 700; margin: 0; }

  .pth-chart-wrap { position: relative; background: var(--pth-card); border: 1px solid var(--pth-border); border-radius: var(--pth-radius); padding: 8px 8px 4px; }
  .pth-svg { display: block; width: 100%; height: auto; touch-action: none; cursor: crosshair; border-radius: 8px; outline: none; }
  .pth-svg:focus-visible { box-shadow: 0 0 0 3px var(--pth-focus); }
  .pth-svg.pth-locked { cursor: default; }

  .pth-hint { text-align: center; color: var(--pth-ink-dim); font-size: 0.8rem; padding: 4px 6px 8px; min-height: 1.4em; }

  .pth-controls { display: flex; gap: 10px; align-items: center; justify-content: space-between; margin-top: 12px; flex-wrap: wrap; }
  .pth-progress { display: flex; gap: 6px; align-items: center; }
  .pth-dot { width: 11px; height: 11px; border-radius: 50%; background: var(--pth-card-2); border: 1px solid var(--pth-border); }
  .pth-dot.pth-dot-current { border-color: var(--pth-pin); }
  .pth-dot.pth-dot-g { background: #22c55e; border-color: #22c55e; }
  .pth-dot.pth-dot-y { background: #eab308; border-color: #eab308; }
  .pth-dot.pth-dot-b { background: #475569; border-color: #475569; }

  .pth-btn {
    appearance: none; border: 0; border-radius: 10px; padding: 10px 20px;
    font-size: 0.95rem; font-weight: 800; cursor: pointer;
    background: var(--pth-pin); color: #1c1500;
    transition: transform 0.08s ease, opacity 0.15s ease;
  }
  .pth-btn:hover:not(:disabled) { transform: translateY(-1px); }
  .pth-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .pth-btn:focus-visible { outline: 3px solid var(--pth-focus); outline-offset: 2px; }
  .pth-btn.pth-btn-ghost { background: var(--pth-card-2); color: var(--pth-ink); }

  .pth-feedback {
    margin-top: 12px; padding: 12px 16px; border-radius: var(--pth-radius);
    background: var(--pth-card); border: 1px solid var(--pth-border);
    display: none;
  }
  .pth-feedback.pth-show { display: block; animation: pth-rise 0.3s ease; }
  @keyframes pth-rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .pth-score-line { font-size: 1.05rem; font-weight: 800; margin: 0 0 4px; }
  .pth-note { color: var(--pth-ink-dim); font-size: 0.9rem; margin: 0; }
  .pth-note strong { color: var(--pth-ink); }

  .pth-end { text-align: center; padding: 18px 10px 6px; }
  .pth-end h2 { margin: 0 0 6px; font-size: 1.3rem; }
  .pth-end-emoji { font-size: 1.5rem; letter-spacing: 0.15em; margin: 10px 0; }
  .pth-end-total { font-size: 2.2rem; font-weight: 900; margin: 4px 0; }
  .pth-end-stars { font-size: 1.2rem; margin-bottom: 8px; }
  .pth-session { color: var(--pth-ink-dim); font-size: 0.82rem; margin: 8px 0 14px; }
  .pth-end-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .pth-copied { color: var(--pth-true); font-size: 0.85rem; min-height: 1.3em; margin-top: 8px; }

  /* ---- level-select menu ---- */
  .pth-menu-intro { color: var(--pth-ink-dim); font-size: 0.92rem; margin: 2px 0 14px; }
  .pth-pick-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: stretch; }
  .pth-pick-row .pth-select { flex: 1 1 220px; width: auto; }
  .pth-level-leader { font-weight: 800; font-size: 1rem; margin: 0 0 2px; }
  .pth-level-context { color: var(--pth-ink-dim); font-size: 0.8rem; margin: 0 0 6px; }
  .pth-level-tag {
    display: inline-block; font-size: 0.68rem; font-weight: 800; text-transform: uppercase;
    letter-spacing: 0.08em; padding: 2px 8px; border-radius: 999px;
    background: var(--pth-card-2); color: var(--pth-ink-dim);
  }
  .pth-level-tag.pth-tag-tutorial { background: rgba(74, 222, 128, 0.15); color: var(--pth-true); }
  .pth-level-tag.pth-tag-expert { background: rgba(248, 113, 113, 0.15); color: var(--pth-bad); }

  /* ---- random leader with prompt difficulty ---- */
  .pth-rand-card {
    background: var(--pth-card); border: 1px solid rgba(255, 209, 102, 0.4);
    border-radius: var(--pth-radius); padding: 12px 14px; margin: 0 0 12px;
  }
  .pth-diff-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
  .pth-diff-btn {
    flex: 1 1 0; appearance: none; cursor: pointer; font: inherit; font-weight: 800;
    font-size: 0.88rem; padding: 9px 6px; border-radius: 10px; border: 1px solid transparent;
    transition: transform 0.08s ease;
  }
  .pth-diff-btn:hover { transform: translateY(-1px); }
  .pth-diff-btn:focus-visible { outline: 3px solid var(--pth-focus); outline-offset: 2px; }
  .pth-diff-easy { background: rgba(74, 222, 128, 0.12); color: var(--pth-true); border-color: rgba(74, 222, 128, 0.4); }
  .pth-diff-medium { background: rgba(255, 209, 102, 0.12); color: var(--pth-pin); border-color: rgba(255, 209, 102, 0.4); }
  .pth-diff-hard { background: rgba(248, 113, 113, 0.12); color: var(--pth-bad); border-color: rgba(248, 113, 113, 0.4); }
  .pth-diff-hint { color: var(--pth-ink-dim); font-size: 0.74rem; margin: 6px 0 0; }

  /* ---- "Whose curve?" reverse mode ---- */
  .pth-who-btn {
    appearance: none; display: block; width: 100%; text-align: left; cursor: pointer;
    background: var(--pth-card); color: var(--pth-ink);
    border: 1px solid rgba(255, 209, 102, 0.4); border-radius: var(--pth-radius);
    padding: 12px 14px; font: inherit; margin: 0 0 12px;
    transition: transform 0.08s ease, border-color 0.15s ease;
  }
  .pth-who-btn:hover { transform: translateY(-1px); border-color: var(--pth-pin); }
  .pth-who-btn:focus-visible { outline: 3px solid var(--pth-focus); outline-offset: 2px; }
  .pth-guess-bar { margin-top: 12px; }
  .pth-select {
    width: 100%; font: inherit; font-weight: 600; color: var(--pth-ink);
    padding: 9px 10px; border-radius: 10px;
    border: 1px solid var(--pth-border); background: var(--pth-card-2);
  }
  .pth-select:focus-visible { outline: 3px solid var(--pth-focus); outline-offset: 1px; }
  .pth-select:disabled { opacity: 0.45; }

  .pth-sr { position: absolute; width: 1px; height: 1px; margin: -1px; overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; }

  /* ---- soft depth so the light theme reads as warm, not flat ---- */
  .pth-headline-card, .pth-chart-wrap, .pth-feedback, .pth-rand-card, .pth-who-btn { box-shadow: var(--pth-shadow); }
  .pth-btn:not(.pth-btn-ghost) { box-shadow: 0 2px 10px rgba(232, 153, 15, 0.30); }
  .pth-btn:not(.pth-btn-ghost):hover:not(:disabled) { box-shadow: 0 4px 16px rgba(232, 153, 15, 0.38); }

  @media (max-width: 480px) {
    .pth { padding: 10px; }
    .pth-headline { font-size: 1rem; }
    .pth-btn { padding: 12px 18px; } /* bigger touch target */
  }
  @media (prefers-reduced-motion: reduce) {
    .pth * { animation: none !important; transition: none !important; }
  }
</style>
</head>

  /* ====================== scoring ====================== */
  var FULL_BAND = 0.03;   // within 3% of timeline width = full points
  var ZERO_BAND = 0.25;   // beyond 25% = zero
  var MAX_PER_PIN = 100;

  function scoreFromDistance(d) {
    if (d <= FULL_BAND) return MAX_PER_PIN;
    if (d >= ZERO_BAND) return 0;
    return Math.round(MAX_PER_PIN * (1 - (d - FULL_BAND) / (ZERO_BAND - FULL_BAND)));
  }
  function bandFromDistance(d) {
    if (d <= 0.05) return "g";
    if (d <= 0.12) return "y";
    return "b";
  }
  var BAND_EMOJI = { g: "🟩", y: "🟨", b: "⬛" };

  /* ====================== utilities ====================== */
  function ts(iso) { return new Date(iso + "T12:00:00Z").getTime(); }
  function shuffled(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }
  function clamp(v, lo, hi) { return Math.min(hi, Math.max(lo, v)); }
  function el(tag, attrs, parent) {
    var ns = "http://www.w3.org/2000/svg";
    var htmlTags = { div: 1, p: 1, button: 1, h2: 1, span: 1, select: 1, option: 1 };
    var node = htmlTags[tag]
      ? document.createElement(tag)
      : document.createElementNS(ns, tag);
    if (attrs) for (var k in attrs) {
      if (k === "text") node.textContent = attrs[k];
      else node.setAttribute(k, attrs[k]);
    }
    if (parent) parent.appendChild(node);
    return node;
  }

  /* ====================== country geography ====================== */
  // Capital-city coordinates for every country that appears in a level's
  // context string. "Whose curve?" uses these to tell the player how far the
  // mystery leader's country is from the country they just guessed.
  var COUNTRY_GEO = {
    "United States": [38.9, -77.04],
    "United Kingdom": [51.51, -0.13],
    "France": [48.85, 2.35],
    "Germany": [52.52, 13.40],
    "Italy": [41.90, 12.50],
    "Spain": [40.42, -3.70],
    "Russia": [55.75, 37.62],
    "Ukraine": [50.45, 30.52],
    "Canada": [45.42, -75.70],
    "Mexico": [19.43, -99.13],
    "Brazil": [-15.78, -47.93],
    "Argentina": [-34.61, -58.38],
    "Japan": [35.68, 139.69],
    "South Korea": [37.55, 126.99],
    "Australia": [-35.28, 149.13],
    "New Zealand": [-41.29, 174.78]
  };
  // Great-circle distance (km) plus an 8-point compass arrow pointing from
  // country `a` toward country `b`. Returns null if either is unmapped.
  function geoBetween(a, b) {
    var ga = COUNTRY_GEO[a], gb = COUNTRY_GEO[b];
    if (!ga || !gb) return null;
    if (a === b) return { km: 0, arrow: "🎯", same: true };
    var R = 6371, toR = Math.PI / 180;
    var lat1 = ga[0] * toR, lat2 = gb[0] * toR;
    var dLat = (gb[0] - ga[0]) * toR, dLon = (gb[1] - ga[1]) * toR;
    var h = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
            Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
    var km = Math.round(2 * R * Math.asin(Math.min(1, Math.sqrt(h))));
    var y = Math.sin(dLon) * Math.cos(lat2);
    var x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon);
    var brg = (Math.atan2(y, x) / toR + 360) % 360;
    var arrows = ["⬆️", "↗️", "➡️", "↘️", "⬇️", "↙️", "⬅️", "↖️"];
    return { km: km, arrow: arrows[Math.round(brg / 45) % 8], same: false };
  }
  // A "warmer/colder" descriptor for a country-to-country distance.
  function geoWarmth(km) {
    if (km < 1500) return "🔥 red hot";
    if (km < 4000) return "🌤️ warm";
    if (km < 8000) return "🧭 cold";
    if (km < 14000) return "❄️ freezing";
    return "🧊 polar opposite";
  }

  /* ====================== prompt difficulty ====================== */
  // Difficulty is a property of the PROMPT, not the leader: how ambiguous the
  // curve is at the headline's true position. A headline that sits on a unique
  // spike (9/11) or at the very start or end of a term is easy to place; one on
  // a long flat stretch that looks like five other stretches is hard. Each
  // leader's 20-headline pool is split into tiers of ~7 by that score, so
  // every difficulty always has enough prompts for a 5-headline round.
  function tieredHeadlines(level) {
    var times = level.series.map(function (p) { return ts(p.date); });
    var t0 = times[0], t1 = times[times.length - 1];
    var vals = level.series.map(function (p) { return p.approval; });
    function apAt(f) {
      var t = t0 + f * (t1 - t0);
      for (var i = 1; i < times.length; i++) {
        if (t <= times[i]) {
          var a = (t - times[i - 1]) / (times[i] - times[i - 1]);
          return vals[i - 1] + a * (vals[i] - vals[i - 1]);
        }
      }
      return vals[vals.length - 1];
    }
    var hi = Math.max.apply(null, vals), lo = Math.min.apply(null, vals);
    var fullRange = Math.max(1, hi - lo);
    var scored = level.headlines.map(function (h) {
      var f = clamp((ts(h.date) - t0) / (t1 - t0), 0, 1);
      var v = apAt(f);
      var matches = 0, total = 0;
      for (var i = 0; i <= 240; i++) {
        var g = i / 240;
        if (Math.abs(g - f) <= 0.05) continue; // the answer zone itself doesn't count as a look-alike
        total++;
        if (Math.abs(apAt(g) - v) <= 4) matches++;
      }
      var score = matches / total;               // how much of the curve "looks like" this spot
      if (f < 0.04 || f > 0.96) score -= 0.35;   // start/end of term: easy anchors
      if (Math.abs(v - hi) <= 3 || Math.abs(v - lo) <= 3) score -= 0.2; // peaks and troughs stand out
      // sharp movement just before/after the event is a giveaway even when the
      // value itself is common — e.g. 9/11 sits at an ordinary ~51%, but the
      // vertical rocket next to it is unmistakable
      var wLo = clamp(f - 0.06, 0, 1), wHi = clamp(f + 0.06, 0, 1);
      var wMin = Infinity, wMax = -Infinity;
      for (var j = 0; j <= 24; j++) {
        var wv = apAt(wLo + (j / 24) * (wHi - wLo));
        if (wv < wMin) wMin = wv;
        if (wv > wMax) wMax = wv;
      }
      score -= clamp((wMax - wMin) / fullRange, 0, 1) * 0.5;
      return { h: h, s: score };
    });
    scored.sort(function (a, b) { return a.s - b.s; });
    var n = scored.length, cut1 = Math.ceil(n / 3), cut2 = Math.ceil(2 * n / 3);
    return {
      easy: scored.slice(0, cut1).map(function (x) { return x.h; }),
      medium: scored.slice(cut1, cut2).map(function (x) { return x.h; }),
      hard: scored.slice(cut2).map(function (x) { return x.h; })
    };
  }

  /* ====================== app ====================== */
  function PinTheHeadline(root, levels) {
    var session = { rounds: 0, bestTotal: 0, totalScore: 0, totalPins: 0, greens: 0 };

    root.classList.add("pth");

    /* ---------------- level-select menu ---------------- */

      el("p", { "class": "pth-level-leader", text: "🕵️ Whose curve? · guess the leader" }, whoBtn);
      el("p", { "class": "pth-level-context", text: "The reverse game: five mystery curves, no names. Read the shape alone — every wrong guess tells you whether the real leader took office earlier or later, and how far their country is from your guess." }, whoBtn);

      }, root);

      var chrono = levels.slice().sort(function (a, b) {
        return ts(a.series[0].date) - ts(b.series[0].date);
      });
      function countryOf(lv) { return lv.context.split(" · ")[0]; }
      var countries = [];
      chrono.forEach(function (lv) {
        var c = countryOf(lv);

      var pickRow = el("div", { "class": "pth-pick-row" }, root);
      var countrySel = el("select", { "class": "pth-select", "aria-label": "Choose a country" }, pickRow);
      el("option", { value: "", text: "Choose a country…", disabled: "disabled", selected: "selected" }, countrySel);
      countries.forEach(function (c) {
        var n = chrono.filter(function (lv) { return countryOf(lv) === c; }).length;
        el("option", { value: c, text: c + " (" + n + (n === 1 ? " leader" : " leaders") + ")" }, countrySel);
      });

      var leaderSel = el("select", { "class": "pth-select", "aria-label": "Choose a leader", disabled: "disabled" }, pickRow);
      el("option", { value: "", text: "Choose a leader…", disabled: "disabled", selected: "selected" }, leaderSel);

      var startBtn = el("button", { "class": "pth-btn", type: "button", text: "Start round 📍", disabled: "disabled" }, pickRow);

      countrySel.addEventListener("change", function () {
        leaderSel.innerHTML = "";

        var inCountry = chrono.filter(function (lv) { return countryOf(lv) === countrySel.value; });
        // only offer "surprise me" when there's actually more than one to pick from
        if (inCountry.length > 1) {
          el("option", { value: "__random__", text: "🎲 Surprise me — any " + countrySel.value + " leader" }, leaderSel);
        }
        inCountry.forEach(function (lv) {
          el("option", { value: lv.id, text: lv.leader + " · " + lv.context.replace(countrySel.value + " · ", "") }, leaderSel);
        });
        leaderSel.disabled = false;
        startBtn.disabled = true;
      });
      leaderSel.addEventListener("change", function () { startBtn.disabled = !leaderSel.value; });
      startBtn.addEventListener("click", function () {
        var pool = chrono.filter(function (lv) { return countryOf(lv) === countrySel.value; });
        var lv = leaderSel.value === "__random__"
          ? pool[Math.floor(Math.random() * pool.length)]
          : pool.filter(function (l) { return l.id === leaderSel.value; })[0];

    function randomLevel(excludeId) {
      var pool = levels.filter(function (lv) { return lv.id !== excludeId; });
      if (!pool.length) pool = levels;
      return pool[Math.floor(Math.random() * pool.length)];
    }

    /* ---------------- one leader's game ---------------- */
    function buildGame(level, opts) {
      opts = opts || { mode: "pick", difficulty: null };
      var tiers = opts.difficulty ? tieredHeadlines(level) : null;

      // --- chart geometry (SVG user units; scales responsively via viewBox) ---
      var W = 800, H = 360;
      var PAD = { l: 44, r: 18, t: 20, b: 34 };
      var plotW = W - PAD.l - PAD.r;
      var plotH = H - PAD.t - PAD.b;

      var times = level.series.map(function (p) { return ts(p.date); });
      var t0 = times[0], t1 = times[times.length - 1];
      var vals = level.series.map(function (p) { return p.approval; });
      var yLo = Math.max(0, Math.floor((Math.min.apply(null, vals) - 6) / 10) * 10);
      var yHi = Math.min(100, Math.ceil((Math.max.apply(null, vals) + 6) / 10) * 10);

      function xOf(t) { return PAD.l + ((t - t0) / (t1 - t0)) * plotW; }
      function yOf(v) { return PAD.t + (1 - (v - yLo) / (yHi - yLo)) * plotH; }
      function fracToX(f) { return PAD.l + f * plotW; }
      function xToFrac(x) { return clamp((x - PAD.l) / plotW, 0, 1); }

      // approval interpolated at an arbitrary timeline fraction (for the pin readout)
      function approvalAtFrac(f) {
        var t = t0 + f * (t1 - t0);
        for (var i = 1; i < times.length; i++) {
          if (t <= times[i]) {
            var a = (t - times[i - 1]) / (times[i] - times[i - 1]);
            return vals[i - 1] + a * (vals[i] - vals[i - 1]);
          }
        }
        return vals[vals.length - 1];
      }

      // --- state ---
      var round = [];          // shuffled headlines for this round
      var idx = 0;             // current headline index
      var pinFrac = null;      // player's pin, 0..1 along timeline
      var phase = "place";     // "place" | "revealed" | "done"
      var results = [];        // { score, band, distance }

      /* ---------- DOM skeleton ---------- */
      root.innerHTML = "";

      var header = el("div", { "class": "pth-header" }, root);
      var back = el("button", { "class": "pth-back", type: "button", text: "← all leaders" }, header);
      back.addEventListener("click", showMenu);
      el("span", {
        "class": "pth-context",
        text: level.leader + " · " + level.context + (opts.difficulty ? " · " + opts.difficulty + " headlines" : "")
      }, header);

      var headlineCard = el("div", { "class": "pth-headline-card" }, root);
      el("div", { "class": "pth-kicker", text: "When did this happen? Read the curve, not your memory." }, headlineCard);
      var headlineEl = el("p", { "class": "pth-headline", "aria-live": "polite" }, headlineCard);

      var chartWrap = el("div", { "class": "pth-chart-wrap" }, root);
      var svg = el("svg", {
        "class": "pth-svg",
        viewBox: "0 0 " + W + " " + H,
        role: "slider",
        tabindex: "0",
        "aria-valuemin": "0",
        "aria-valuemax": "100",
        "aria-label": "Timeline of " + level.leader + "'s approval rating, dates hidden. Use left and right arrow keys to place your pin along the timeline, then press Enter to submit. Tap or click the chart to place the pin directly.",
        "aria-orientation": "horizontal"
      }, chartWrap);
      var hintEl = el("div", { "class": "pth-hint" }, chartWrap);

      var live = el("div", { "class": "pth-sr", "aria-live": "polite", role: "status" }, root);

      var controls = el("div", { "class": "pth-controls" }, root);
      var progress = el("div", { "class": "pth-progress", "aria-label": "Round progress" }, controls);
      var submitBtn = el("button", { "class": "pth-btn", type: "button", text: "Pin it 📍" }, controls);

      var feedback = el("div", { "class": "pth-feedback" }, root);

      /* ---------- SVG layers ---------- */
      var defs = el("defs", null, svg);
      var grad = el("linearGradient", { id: "pth-area-grad", x1: "0", y1: "0", x2: "0", y2: "1" }, defs);
      el("stop", { offset: "0%", "stop-color": "var(--pth-area-top)" }, grad);
      el("stop", { offset: "100%", "stop-color": "var(--pth-area-bot)" }, grad);

      var gGrid = el("g", null, svg);
      var gCurve = el("g", null, svg);
      var gAftermath = el("g", null, svg);
      var gAnno = el("g", null, svg);
      var gPin = el("g", null, svg);

      // grid + y labels (approval % stays labeled; dates do NOT)
      for (var gv = yLo; gv <= yHi; gv += 10) {
        if (gv % 20 !== 0 && gv !== yLo && gv !== yHi) continue;
        var gy = yOf(gv);
        el("line", { x1: PAD.l, x2: W - PAD.r, y1: gy, y2: gy, stroke: "var(--pth-grid)", "stroke-width": 1 }, gGrid);
        el("text", { x: PAD.l - 8, y: gy + 4, "text-anchor": "end", "font-size": 12, fill: "var(--pth-ink-dim)", text: gv + "%" }, gGrid);
      }
      // unlabeled time axis with a direction hint only
      el("line", { x1: PAD.l, x2: W - PAD.r, y1: H - PAD.b, y2: H - PAD.b, stroke: "var(--pth-axis)", "stroke-width": 1.5 }, gGrid);
      el("text", { x: W - PAD.r, y: H - PAD.b + 20, "text-anchor": "end", "font-size": 12, fill: "var(--pth-ink-dim)", text: "time → (dates hidden)" }, gGrid);

      // curve + area
      var lineD = "";
      level.series.forEach(function (p, i) {
        var x = xOf(times[i]).toFixed(1), y = yOf(p.approval).toFixed(1);
        lineD += (i === 0 ? "M" : "L") + x + " " + y + " ";
      });
      var areaD = lineD + "L" + xOf(t1).toFixed(1) + " " + (H - PAD.b) + " L" + xOf(t0).toFixed(1) + " " + (H - PAD.b) + " Z";
      el("path", { d: areaD, fill: "url(#pth-area-grad)" }, gCurve);
      el("path", { d: lineD, fill: "none", stroke: "var(--pth-line)", "stroke-width": 2.5, "stroke-linejoin": "round", "stroke-linecap": "round" }, gCurve);

      // player pin (vertical line + handle on curve + axis triangle + readout)
      var pinLine = el("line", { y1: PAD.t, y2: H - PAD.b, stroke: "var(--pth-pin)", "stroke-width": 2, "stroke-dasharray": "5 4", visibility: "hidden" }, gPin);
      var pinDot = el("circle", { r: 7, fill: "var(--pth-pin)", stroke: "#1c1500", "stroke-width": 2, visibility: "hidden" }, gPin);
      var pinTri = el("path", { fill: "var(--pth-pin)", visibility: "hidden" }, gPin);
      var pinLabel = el("text", { "font-size": 13, "font-weight": "700", fill: "var(--pth-pin)", "text-anchor": "middle", visibility: "hidden" }, gPin);

      function drawPin(f) {
        var x = fracToX(f), av = approvalAtFrac(f), y = yOf(av);
        pinLine.setAttribute("x1", x); pinLine.setAttribute("x2", x);
        pinDot.setAttribute("cx", x); pinDot.setAttribute("cy", y);
        pinTri.setAttribute("d", "M" + (x - 7) + " " + (H - PAD.b + 12) + " L" + (x + 7) + " " + (H - PAD.b + 12) + " L" + x + " " + (H - PAD.b + 2) + " Z");
        pinLabel.setAttribute("x", clamp(x, PAD.l + 24, W - PAD.r - 24));
        pinLabel.setAttribute("y", clamp(y - 14, PAD.t + 12, H - PAD.b));
        pinLabel.textContent = Math.round(av) + "%";
        [pinLine, pinDot, pinTri, pinLabel].forEach(function (n) { n.setAttribute("visibility", "visible"); });
      }
      function hidePin() {
        [pinLine, pinDot, pinTri, pinLabel].forEach(function (n) { n.setAttribute("visibility", "hidden"); });
      }

      /* ---------- input: pointer ---------- */
      var dragging = false;
      function pointerFrac(evt) {
        // convert client coords -> SVG user units via inverse CTM
        var pt = svg.createSVGPoint();
        pt.x = evt.clientX; pt.y = evt.clientY;
        var sp = pt.matrixTransform(svg.getScreenCTM().inverse());
        return xToFrac(sp.x);
      }
      function setPin(f, announce) {
        pinFrac = clamp(f, 0, 1);
        drawPin(pinFrac);
        svg.setAttribute("aria-valuenow", Math.round(pinFrac * 100));
        svg.setAttribute("aria-valuetext", Math.round(pinFrac * 100) + "% along the timeline, approval here is about " + Math.round(approvalAtFrac(pinFrac)) + "%");
        submitBtn.disabled = false;
        if (announce) live.textContent = "Pin at " + Math.round(pinFrac * 100) + "% of the timeline.";
      }
      svg.addEventListener("pointerdown", function (e) {
        if (phase !== "place") return;
        dragging = true;
        try { svg.setPointerCapture(e.pointerId); } catch (err) { /* capture is best-effort */ }
        setPin(pointerFrac(e), false);
        e.preventDefault();
      });
      svg.addEventListener("pointermove", function (e) {
        if (!dragging || phase !== "place") return;
        setPin(pointerFrac(e), false);
      });
      svg.addEventListener("pointerup", function () { dragging = false; });
      svg.addEventListener("pointercancel", function () { dragging = false; });

      /* ---------- input: keyboard ---------- */
      svg.addEventListener("keydown", function (e) {
        if (phase !== "place") {
          if (e.key === "Enter" || e.key === " ") { e.preventDefault(); submitBtn.click(); }
          return;
        }
        var step = e.shiftKey ? 0.05 : 0.01;
        var f = pinFrac === null ? 0.5 : pinFrac;
        switch (e.key) {
          case "ArrowLeft": case "ArrowDown": setPin(f - step, true); e.preventDefault(); break;
          case "ArrowRight": case "ArrowUp": setPin(f + step, true); e.preventDefault(); break;
          case "Home": setPin(0, true); e.preventDefault(); break;
          case "End": setPin(1, true); e.preventDefault(); break;
          case "Enter": case " ":
            if (pinFrac === null) setPin(0.5, true);
            else submit();
            e.preventDefault();
            break;
        }
      });

      /* ---------- reveal ---------- */
      function clearReveal() {
        gAftermath.innerHTML = "";
        gAnno.innerHTML = "";
      }

      function drawAftermath(trueT) {
        // highlight what approval did in the ~4 months after the event
        // (on very short timelines, use a fifth of the total span instead)
        var span = Math.min(120 * 86400000, (t1 - t0) / 5);
        var endT = Math.min(trueT + span, t1);
        var pts = [[trueT, approvalAtFrac((trueT - t0) / (t1 - t0))]];
        for (var i = 0; i < times.length; i++) {
          if (times[i] > trueT && times[i] < endT) pts.push([times[i], vals[i]]);
        }
        pts.push([endT, approvalAtFrac((endT - t0) / (t1 - t0))]);
        var d = pts.map(function (p, i) {
          return (i === 0 ? "M" : "L") + xOf(p[0]).toFixed(1) + " " + yOf(p[1]).toFixed(1);
        }).join(" ");
        var path = el("path", { d: d, fill: "none", stroke: "var(--pth-true)", "stroke-width": 4.5, "stroke-linecap": "round", opacity: 0 }, gAftermath);
        // draw-in animation
        try {
          var len = path.getTotalLength();
          path.setAttribute("stroke-dasharray", len);
          path.setAttribute("stroke-dashoffset", len);
          path.setAttribute("opacity", 0.9);
          path.getBoundingClientRect(); // flush
          path.style.transition = "stroke-dashoffset 0.8s ease 0.55s";
          path.style.strokeDashoffset = "0";
        } catch (err) { path.setAttribute("opacity", 0.9); }
      }

      function drawTrueMarker(trueFrac, animateFromFrac, done) {
        var tx = fracToX(trueFrac);
        var trueLine = el("line", { x1: tx, x2: tx, y1: PAD.t, y2: H - PAD.b, stroke: "var(--pth-true)", "stroke-width": 2, opacity: 0 }, gAnno);
        var labX = clamp(tx, PAD.l + 70, W - PAD.r - 70);
        var lab = el("text", {
          x: labX, y: PAD.t + 14, "text-anchor": "middle", "font-size": 13, "font-weight": "800",
          fill: "var(--pth-true)", opacity: 0, text: "← it happened here"
        }, gAnno);
        if (tx > labX) lab.textContent = "it happened here →";
        else if (Math.abs(tx - labX) < 30) lab.textContent = "↓ it happened here";

        // ghost of the guess stays put; an accent dot flies from guess to truth
        var gx = fracToX(animateFromFrac);
        var flyer = el("circle", { cx: gx, cy: H - PAD.b - 8, r: 7, fill: "var(--pth-true)", stroke: "#06270f", "stroke-width": 2 }, gAnno);
        var start = null, DUR = 600;
        var reduced = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        function frame(now) {
          if (!start) start = now;
          var p = clamp((now - start) / DUR, 0, 1);
          var ease = 1 - Math.pow(1 - p, 3);
          flyer.setAttribute("cx", gx + (tx - gx) * ease);
          if (p < 1) requestAnimationFrame(frame);
          else {
            trueLine.style.transition = "opacity 0.25s"; trueLine.setAttribute("opacity", 0.95);
            lab.style.transition = "opacity 0.25s"; lab.setAttribute("opacity", 1);
            if (done) done();
          }
        }
        if (reduced) {
          flyer.setAttribute("cx", tx);
          trueLine.setAttribute("opacity", 0.95);
          lab.setAttribute("opacity", 1);
          if (done) done();
        } else requestAnimationFrame(frame);
      }

      function submit() {
        if (phase !== "place" || pinFrac === null) return;
        phase = "revealed";
        svg.classList.add("pth-locked");

        var h = round[idx];
        var trueFrac = clamp((ts(h.date) - t0) / (t1 - t0), 0, 1);
        var d = Math.abs(pinFrac - trueFrac);
        var score = scoreFromDistance(d);
        var band = bandFromDistance(d);
        results.push({ score: score, band: band, distance: d });

        // gray out the guess pin into a "ghost"
        pinLine.setAttribute("stroke", "var(--pth-ghost)");
        pinDot.setAttribute("fill", "var(--pth-ghost)");
        pinTri.setAttribute("fill", "var(--pth-ghost)");
        pinLabel.setAttribute("visibility", "hidden");

        drawTrueMarker(trueFrac, pinFrac, function () { drawAftermath(ts(h.date)); });

        var pct = Math.round(d * 100);
        var verdict = band === "g" ? "Bullseye!" : band === "y" ? "Close!" : "Way off.";
        feedback.innerHTML = "";
        var sl = el("p", { "class": "pth-score-line" }, feedback);
        sl.textContent = BAND_EMOJI[band] + " " + verdict + " " + score + "/" + MAX_PER_PIN + " — you were " + pct + "% of the timeline away.";
        var noteP = el("p", { "class": "pth-note" }, feedback);
        noteP.innerHTML = "<strong>" + h.date + ":</strong> " + (h.note || "This is where it happened.");
        feedback.classList.add("pth-show");
        live.textContent = verdict + " Scored " + score + " out of " + MAX_PER_PIN + ". " + (h.note || "");

        hintEl.textContent = "The green line is where it really happened — and what approval did next.";
        submitBtn.textContent = idx + 1 < round.length ? "Next headline →" : "See results →";
        submitBtn.disabled = false;
        renderProgress();
      }

      /* ---------- round flow ---------- */
      function renderProgress() {
        progress.innerHTML = "";
        for (var i = 0; i < round.length; i++) {
          var cls = "pth-dot";
          if (i < results.length) cls += " pth-dot-" + results[i].band;
          else if (i === idx && phase === "place") cls += " pth-dot-current";
          el("div", { "class": cls }, progress);
        }
      }

      function showHeadline() {
        phase = "place";
        pinFrac = null;
        hidePin();
        clearReveal();
        svg.classList.remove("pth-locked");
        svg.removeAttribute("aria-valuenow");
        pinLine.setAttribute("stroke", "var(--pth-pin)");
        pinDot.setAttribute("fill", "var(--pth-pin)");
        pinTri.setAttribute("fill", "var(--pth-pin)");
        feedback.classList.remove("pth-show");
        headlineEl.textContent = "“" + round[idx].text + "”";
        hintEl.textContent = "Tap or click the timeline where you think this happened · headline " + (idx + 1) + " of " + round.length;
        submitBtn.textContent = "Pin it 📍";
        submitBtn.disabled = true;
        renderProgress();
        live.textContent = "Headline " + (idx + 1) + " of " + round.length + ": " + round[idx].text;
      }

      function totalScore() {
        return results.reduce(function (s, r) { return s + r.score; }, 0);
      }

      function shareText() {
        var emoji = results.map(function (r) { return BAND_EMOJI[r.band]; }).join("");
        return "📍 Pin the Headline — " + level.leader +
          (opts.difficulty ? " (" + opts.difficulty + ")" : "") + "\n" +
          emoji + " " + totalScore() + "/" + round.length * MAX_PER_PIN + "\n" +
          "Can you read the curve? " + SITE_URL;
      }

      function showEnd() {
        phase = "done";
        var total = totalScore();
        session.rounds += 1;
        session.totalScore += total;
        session.totalPins += results.length;
        session.greens += results.filter(function (r) { return r.band === "g"; }).length;
        if (total > session.bestTotal) session.bestTotal = total;

        var stars = Math.round((total / (round.length * MAX_PER_PIN)) * 5);
        var starStr = "★".repeat(stars) + "☆".repeat(5 - stars);

        feedback.classList.remove("pth-show");
        hintEl.textContent = "";
        headlineEl.textContent = "Round complete!";

        feedback.innerHTML = "";
        var end = el("div", { "class": "pth-end" }, feedback);
        el("h2", { text: level.leader + " — round complete" }, end);
        el("div", { "class": "pth-end-emoji", text: results.map(function (r) { return BAND_EMOJI[r.band]; }).join("") }, end);
        el("div", { "class": "pth-end-total", text: total + " / " + round.length * MAX_PER_PIN }, end);
        el("div", { "class": "pth-end-stars", "aria-label": stars + " out of 5 stars", text: starStr }, end);
        el("p", {
          "class": "pth-session",
          text: "Session: " + session.rounds + " round" + (session.rounds === 1 ? "" : "s") +
            " · best " + session.bestTotal +
            " · " + session.greens + "/" + session.totalPins + " bullseyes"
        }, end);

        var actions = el("div", { "class": "pth-end-actions" }, end);
        var copyBtn = el("button", { "class": "pth-btn", type: "button", text: "Copy result 📋" }, actions);
        var againBtn = el("button", {
          "class": "pth-btn pth-btn-ghost", type: "button",
          text: opts.mode === "random" ? "New leader 🎲" : "Play again"
        }, actions);
        var menuBtn = el("button", { "class": "pth-btn pth-btn-ghost", type: "button", text: "All leaders" }, actions);
        var copied = el("div", { "class": "pth-copied", "aria-live": "polite" }, end);

        copyBtn.addEventListener("click", function () {
          var txt = shareText();
          function ok() { copied.textContent = "Copied to clipboard!"; }
          function fallback() {
            var ta = document.createElement("textarea");
            ta.value = txt; ta.style.position = "fixed"; ta.style.opacity = "0";
            document.body.appendChild(ta); ta.select();
            try { document.execCommand("copy"); ok(); } catch (e) { copied.textContent = txt; }
            document.body.removeChild(ta);
          }
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(txt).then(ok, fallback);
          } else fallback();
        });
        againBtn.addEventListener("click", function () {
          if (opts.mode === "random") buildGame(randomLevel(level.id), opts); // re-deal a different leader
          else startRound();
        });
        menuBtn.addEventListener("click", showMenu);

        feedback.classList.add("pth-show");
        submitBtn.disabled = true;
        submitBtn.textContent = "Pin it 📍";
        live.textContent = "Round complete. Total score " + total + " out of " + round.length * MAX_PER_PIN + ".";
      }

      function startRound() {
        // draw 5 from the pool; replays differ. In random mode the pool is the
        // chosen difficulty tier (~a third of the pool) instead of the whole pool.
        var pool = tiers ? tiers[opts.difficulty] : level.headlines;
        round = shuffled(pool).slice(0, Math.min(5, pool.length));
        idx = 0;
        results = [];
        showHeadline();
      }

      submitBtn.addEventListener("click", function () {
        if (phase === "place") submit();
        else if (phase === "revealed") {
          idx += 1;
          if (idx < round.length) showHeadline();
          else showEnd();
        }
      });

      startRound();
    }

    /* ---------------- whose curve? — guess the leader ---------------- */
    // The reverse game: five unlabeled curves; the player names the leader
    // from shape alone. Wrong guesses reveal whether the mystery leader took
    // office earlier or later (by term start) AND how far the guessed country
    // is from the real one (great-circle distance + compass arrow + a
    // warmer/colder descriptor, Worldle-style). Every leader stays selectable
    // — nothing is grayed out. The x-axis is normalized, so term length
    // doesn't give the answer away.
    function buildWhoGame() {
      var W = 800, H = 360;
      var PAD = { l: 44, r: 18, t: 20, b: 34 };
      var plotW = W - PAD.l - PAD.r;
      var plotH = H - PAD.t - PAD.b;

      // all leaders in term-start order; hints and elimination work on this axis
      var chrono = levels.slice().sort(function (a, b) {
        return ts(a.series[0].date) - ts(b.series[0].date);
      });
      function whoCountry(lv) { return lv.context.split(" · ")[0]; }
      var roundLevels = shuffled(levels).slice(0, 5);
      var ci = 0;              // current curve index
      var results = [];        // { score, band }
      var phase = "guess";     // "guess" | "revealed" | "done"
      var guesses = 0;
      var loIdx = 0, hiIdx = chrono.length - 1; // feasible chronological window

      root.innerHTML = "";

      var header = el("div", { "class": "pth-header" }, root);
      var back = el("button", { "class": "pth-back", type: "button", text: "← all leaders" }, header);
      back.addEventListener("click", showMenu);
      el("span", { "class": "pth-context", text: "Whose curve? · " + chrono.length + " possible leaders" }, header);

      var card = el("div", { "class": "pth-headline-card" }, root);
      el("div", { "class": "pth-kicker", text: "Whose curve is this? Read the shape — honeymoons, rallies, scandals." }, card);
      var questionEl = el("p", { "class": "pth-headline", "aria-live": "polite" }, card);

      var chartWrap = el("div", { "class": "pth-chart-wrap" }, root);
      var svg = el("svg", {
        "class": "pth-svg pth-locked",
        viewBox: "0 0 " + W + " " + H,
        role: "img",
        "aria-label": "An unlabeled approval curve. Use the dropdown below to guess which leader it belongs to."
      }, chartWrap);
      var hintEl = el("div", { "class": "pth-hint" }, chartWrap);

      var live = el("div", { "class": "pth-sr", "aria-live": "polite", role: "status" }, root);

      var guessBar = el("div", { "class": "pth-guess-bar" }, root);
      var sel = el("select", { "class": "pth-select", "aria-label": "Guess the leader" }, guessBar);

      var controls = el("div", { "class": "pth-controls" }, root);
      var progress = el("div", { "class": "pth-progress", "aria-label": "Round progress" }, controls);
      var actionBtn = el("button", { "class": "pth-btn", type: "button", text: "Guess 🕵️" }, controls);

      var feedback = el("div", { "class": "pth-feedback" }, root);

      function drawCurve(level) {
        svg.innerHTML = "";
        var defs = el("defs", null, svg);
        var grad = el("linearGradient", { id: "pth-area-grad-who", x1: "0", y1: "0", x2: "0", y2: "1" }, defs);
        el("stop", { offset: "0%", "stop-color": "var(--pth-area-top)" }, grad);
        el("stop", { offset: "100%", "stop-color": "var(--pth-area-bot)" }, grad);

        var times = level.series.map(function (p) { return ts(p.date); });
        var t0 = times[0], t1 = times[times.length - 1];
        var vals = level.series.map(function (p) { return p.approval; });
        var yLo = Math.max(0, Math.floor((Math.min.apply(null, vals) - 6) / 10) * 10);
        var yHi = Math.min(100, Math.ceil((Math.max.apply(null, vals) + 6) / 10) * 10);
        function xOf(t) { return PAD.l + ((t - t0) / (t1 - t0)) * plotW; }
        function yOf(v) { return PAD.t + (1 - (v - yLo) / (yHi - yLo)) * plotH; }

        for (var gv = yLo; gv <= yHi; gv += 10) {
          if (gv % 20 !== 0 && gv !== yLo && gv !== yHi) continue;
          var gy = yOf(gv);
          el("line", { x1: PAD.l, x2: W - PAD.r, y1: gy, y2: gy, stroke: "var(--pth-grid)", "stroke-width": 1 }, svg);
          el("text", { x: PAD.l - 8, y: gy + 4, "text-anchor": "end", "font-size": 12, fill: "var(--pth-ink-dim)", text: gv + "%" }, svg);
        }
        el("line", { x1: PAD.l, x2: W - PAD.r, y1: H - PAD.b, y2: H - PAD.b, stroke: "var(--pth-axis)", "stroke-width": 1.5 }, svg);
        el("text", { x: W - PAD.r, y: H - PAD.b + 20, "text-anchor": "end", "font-size": 12, fill: "var(--pth-ink-dim)", text: "time → (dates hidden)" }, svg);

        var lineD = "";
        level.series.forEach(function (p, i) {
          var x = xOf(times[i]).toFixed(1), y = yOf(p.approval).toFixed(1);
          lineD += (i === 0 ? "M" : "L") + x + " " + y + " ";
        });
        var areaD = lineD + "L" + xOf(t1).toFixed(1) + " " + (H - PAD.b) + " L" + xOf(t0).toFixed(1) + " " + (H - PAD.b) + " Z";
        el("path", { d: areaD, fill: "url(#pth-area-grad-who)" }, svg);
        el("path", { d: lineD, fill: "none", stroke: "var(--pth-line)", "stroke-width": 2.5, "stroke-linejoin": "round", "stroke-linecap": "round" }, svg);
      }

      function rebuildOptions() {
        sel.innerHTML = "";
        el("option", { value: "", text: "Guess a leader…", disabled: "disabled", selected: "selected" }, sel);
        chrono.forEach(function (lv, i) {
          // Every leader stays selectable — nothing is grayed out, even once
          // the earlier/later clues have logically ruled it out.
          el("option", { value: lv.id, text: lv.leader + " — " + lv.context }, sel);
        });
        sel.value = "";
      }

      function renderProgress() {
        progress.innerHTML = "";
        for (var i = 0; i < roundLevels.length; i++) {
          var cls = "pth-dot";
          if (i < results.length) cls += " pth-dot-" + results[i].band;
          else if (i === ci && phase === "guess") cls += " pth-dot-current";
          el("div", { "class": cls }, progress);
        }
      }

      function showCurve() {
        phase = "guess";
        guesses = 0;
        loIdx = 0; hiIdx = chrono.length - 1;
        drawCurve(roundLevels[ci]);
        questionEl.textContent = "Which leader's approval curve is this?";
        hintEl.textContent = "Curve " + (ci + 1) + " of " + roundLevels.length + " · wrong guesses reveal earlier/later (by term start) and how far that country is";
        feedback.classList.remove("pth-show");
        rebuildOptions();
        sel.disabled = false;
        actionBtn.textContent = "Guess 🕵️";
        actionBtn.disabled = true;
        renderProgress();
        live.textContent = "Curve " + (ci + 1) + " of " + roundLevels.length + ". Guess the leader.";
      }

      function guess() {
        if (!sel.value) return;
        var level = roundLevels[ci];
        var gIdx = -1, tIdx = -1;
        chrono.forEach(function (lv, i) {
          if (lv.id === sel.value) gIdx = i;
          if (lv.id === level.id) tIdx = i;
        });
        guesses++;
        feedback.innerHTML = "";

        if (gIdx === tIdx) {
          phase = "revealed";
          var score = Math.max(0, MAX_PER_PIN - 15 * (guesses - 1));
          var band = guesses === 1 ? "g" : guesses <= 4 ? "y" : "b";
          results.push({ score: score, band: band });

          questionEl.textContent = "It's " + level.leader + "! — " + level.context;

          var sl = el("p", { "class": "pth-score-line" }, feedback);
          sl.textContent = BAND_EMOJI[band] + " " + (guesses === 1 ? "First try!" : "Got it in " + guesses + " guesses.") + " " + score + "/" + MAX_PER_PIN;
          live.textContent = "Correct: " + level.leader + ". Scored " + score + " out of " + MAX_PER_PIN + ".";

          hintEl.textContent = "";
          sel.disabled = true;
          actionBtn.textContent = ci + 1 < roundLevels.length ? "Next curve →" : "See results →";
          actionBtn.disabled = false;
        } else {
          var dirLater = gIdx < tIdx;
          if (dirLater) loIdx = Math.max(loIdx, gIdx + 1);
          else hiIdx = Math.min(hiIdx, gIdx - 1);
          rebuildOptions();
          actionBtn.disabled = true;

          var sl2 = el("p", { "class": "pth-score-line" }, feedback);
          sl2.textContent = (dirLater ? "→ Later." : "← Earlier.") +
            " The mystery leader took office " + (dirLater ? "after " : "before ") +
            chrono[gIdx].leader + " (" + chrono[gIdx].context + ").";
          var geo = geoBetween(whoCountry(chrono[gIdx]), whoCountry(level));
          if (geo) {
            el("p", { "class": "pth-note", text: geo.same
              ? "🎯 Right country — wrong leader."
              : "🌍 The mystery leader's country is about " + geo.km.toLocaleString() + " km " + geo.arrow + " from " + whoCountry(chrono[gIdx]) + " · " + geoWarmth(geo.km) }, feedback);
          }
          var left = hiIdx - loIdx + 1;
          el("p", { "class": "pth-note", text: left + " leader" + (left === 1 ? "" : "s") + " still fit the earlier/later clues — but you can guess any of them." }, feedback);
          live.textContent = "Wrong. The mystery leader took office " + (dirLater ? "later" : "earlier") + " than " + chrono[gIdx].leader +
            (geo && !geo.same ? ", whose country is about " + geo.km + " kilometres away." : ".");
        }
        feedback.classList.add("pth-show");
        renderProgress();
      }

      function showWhoEnd() {
        phase = "done";
        var total = results.reduce(function (s, r) { return s + r.score; }, 0);
        session.rounds += 1;
        session.totalScore += total;
        session.totalPins += results.length;
        session.greens += results.filter(function (r) { return r.band === "g"; }).length;
        if (total > session.bestTotal) session.bestTotal = total;

        var stars = Math.round((total / (results.length * MAX_PER_PIN)) * 5);
        var starStr = "★".repeat(stars) + "☆".repeat(5 - stars);

        questionEl.textContent = "Round complete!";
        hintEl.textContent = "";
        sel.disabled = true;

        feedback.innerHTML = "";
        var end = el("div", { "class": "pth-end" }, feedback);
        el("h2", { text: "Whose curve? — round complete" }, end);
        el("div", { "class": "pth-end-emoji", text: results.map(function (r) { return BAND_EMOJI[r.band]; }).join("") }, end);
        el("div", { "class": "pth-end-total", text: total + " / " + results.length * MAX_PER_PIN }, end);
        el("div", { "class": "pth-end-stars", "aria-label": stars + " out of 5 stars", text: starStr }, end);
        el("p", {
          "class": "pth-session",
          text: "Session: " + session.rounds + " round" + (session.rounds === 1 ? "" : "s") +
            " · best " + session.bestTotal +
            " · " + session.greens + "/" + session.totalPins + " bullseyes"
        }, end);

        var actions = el("div", { "class": "pth-end-actions" }, end);
        var copyBtn = el("button", { "class": "pth-btn", type: "button", text: "Copy result 📋" }, actions);
        var againBtn = el("button", { "class": "pth-btn pth-btn-ghost", type: "button", text: "New curves 🕵️" }, actions);
        var menuBtn = el("button", { "class": "pth-btn pth-btn-ghost", type: "button", text: "All leaders" }, actions);
        var copied = el("div", { "class": "pth-copied", "aria-live": "polite" }, end);

        copyBtn.addEventListener("click", function () {
          var txt = "📍 Pin the Headline — Whose curve?\n" +
            results.map(function (r) { return BAND_EMOJI[r.band]; }).join("") + " " + total + "/" + results.length * MAX_PER_PIN + "\n" +
            "Name the leader from the curve alone: " + SITE_URL;
          function ok() { copied.textContent = "Copied to clipboard!"; }
          function fallback() {
            var ta = document.createElement("textarea");
            ta.value = txt; ta.style.position = "fixed"; ta.style.opacity = "0";
            document.body.appendChild(ta); ta.select();
            try { document.execCommand("copy"); ok(); } catch (e) { copied.textContent = txt; }
            document.body.removeChild(ta);
          }
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(txt).then(ok, fallback);
          } else fallback();
        });
        againBtn.addEventListener("click", function () { buildWhoGame(); });
        menuBtn.addEventListener("click", showMenu);

        feedback.classList.add("pth-show");
        actionBtn.disabled = true;
        actionBtn.textContent = "Guess 🕵️";
        live.textContent = "Round complete. Total score " + total + " out of " + results.length * MAX_PER_PIN + ".";
      }

      sel.addEventListener("change", function () {
        if (phase === "guess") actionBtn.disabled = !sel.value;
      });
      actionBtn.addEventListener("click", function () {
        if (phase === "guess") guess();
        else if (phase === "revealed") {
          ci += 1;
          if (ci < roundLevels.length) showCurve();
          else showWhoEnd();
        }
      });

      showCurve();
    }

    showMenu();
  }

  /* ---- mount: auto-attach to #pin-the-headline, or call window.PinTheHeadline.mount(el, data) ---- */
  window.PinTheHeadline = {
    mount: function (target, data) { PinTheHeadline(target, data || DATA); }
  };
  var auto = document.getElementById("pin-the-headline");
  if (auto) PinTheHeadline(auto, DATA);
})();
</script>
</body>
</html>
